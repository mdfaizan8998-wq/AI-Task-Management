<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- <link rel="stylesheet" href="static/static.css"> -->

    <style>
        /* ==========================================
   1. GLOBAL VARIABLES & FONTS
   ========================================== */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #020617 100%);
            --card-bg: rgba(30, 41, 59, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-glow: rgba(99, 102, 241, 0.1);

            /* Brand Accent Colors */
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.4);

            /* Typography Colors */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;

            /* Priority & Badges */
            --high-color: #ef4444;
            --medium-color: #f59e0b;
            --low-color: #10b981;
        }

        /* ==========================================
   2. CORE BASE STYLES
   ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: var(--text-main);
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* ==========================================
   3. THE ANTI-BUG SHIELD (.hidden)
   ========================================== */
        .hidden {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* ==========================================
   4. LAYOUT CONTAINER
   ========================================== */
        .container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ==========================================
   5. AUTHENTICATION CARDS (Register, Verify, Login)
   ========================================== */
        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 460px;
            margin: 40px auto;
        }

        .auth-card h2 {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);

            /* 1. Webkit/Safari Compatibility */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* 2. Standard Property for Modern Browsers */
            background-clip: text;
            color: transparent;
            /* Standard fall-back for transparency */

            letter-spacing: -0.5px;
        }

        /* Input Groups */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 15px 16px 15px 48px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px var(--card-glow);
        }

        .input-group input:focus+i {
            color: var(--primary);
        }

        /* Primary Form Buttons */
        .btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        .switch-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .switch-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .switch-text a:hover {
            text-decoration: underline;
        }

        /* ==========================================
   6. PREMIUM TODO DASHBOARD LAYOUT
   ========================================== */
        .dashboard-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 24px;
            margin-bottom: 30px;
        }

        .dash-header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .dash-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #ef4444;
            color: white;
            transform: translateY(-1px);
        }

        /* Task Form Section */
        .task-form-container {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 35px;
        }

        .task-form-container h3 {
            font-size: 1.15rem;
            margin-bottom: 18px;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }

        .form-row input[type="text"] {
            flex: 3;
        }

        .form-row select,
        .form-row-grid select,
        .form-row-grid input[type="date"] {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .form-row input[type="text"],
        .task-form-container textarea {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 12px 14px;
            color: white;
            outline: none;
            font-size: 0.95rem;
            width: 100%;
        }

        .task-form-container textarea {
            margin-bottom: 14px;
            resize: none;
        }

        .form-row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .input-date-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-date-wrap label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Action Buttons inside Task Form */
        .btn-action-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 14px var(--primary-glow);
            transition: all 0.2s;
        }

        .btn-action-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-action-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-action-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ==========================================
   7. DYNAMIC TASK LIST GRAPHICS
   ========================================== */
        .todo-section h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tasks-grid-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .task-item-card {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .task-item-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateX(4px);
        }

        .task-meta {
            flex: 1;
        }

        .task-meta h4 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .task-meta p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        /* Tags Systems */
        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag.high {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .tag.medium {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .tag.low {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .tag.status-badge {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .tag.date-badge {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        /* Control Icons inside Cards */
        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-icon.edit {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .btn-icon.edit:hover {
            background: #3b82f6;
            color: white;
        }

        .btn-icon.delete {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .btn-icon.delete:hover {
            background: #ef4444;
            color: white;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 30px 0;
        }

        /* ==========================================
   8. NOTIFICATION TOAST OVERLAY
   ========================================== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 28px;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ==========================================
   9. SMOOTH ENTRY ANIMATION
   ========================================== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* AI Tag Container ke liye unique glassmorphism and pop effect */
        #ai-tag-wrapper {
            background: rgba(167, 119, 227, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
            border-left: 4px solid #a777e3;
            display: inline-block;
            box-shadow: 0 0 15px rgba(167, 119, 227, 0.2);

            /* Animation Properties */
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Jab AI Response success ho, tab yeh class active hogi */
        #ai-tag-wrapper.show-ai {
            opacity: 1;
            transform: translateY(0);
        }

        /* Textarea ke change hone par highlight/glow animation */
        .ai-glow-active {
            animation: pulse-glow 1.5s ease-in-out;
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 0px rgba(110, 142, 251, 0);
                border-color: rgba(110, 142, 251, 0.5);
            }

            50% {
                box-shadow: 0 0 15px rgba(110, 142, 251, 0.6);
                border-color: #6e8efb;
            }

            100% {
                box-shadow: 0 0 0px rgba(110, 142, 251, 0);
            }
        }

        #task-desc {
            width: 100%;
            resize: none;
            /* User khud se pakad kar bada na kar paye */
            overflow: hidden;
            /* Scrollbar ko poori tarah hide karne ke liye */
            min-height: 50px;
            /* Starting ki kam se kam height */
            max-height: 300px;
            /* Safety cap taaki poora page na bhar jaye (optional) */
            box-sizing: border-box;
            transition: height 0.15s ease-out;
            /* Smooth height scaling transition */
        }
  
}
    </style>

<body>
    <h1></h1>
    <div class="container">
        <div id="register-card" class="auth-card">
            <h2>Create Account</h2>
            <form id="register-form">
                <div class="input-group"><i class="fa-solid fa-user"></i><input type="text" id="reg-name"
                        placeholder="Full Name" required></div>
                <div class="input-group"><i class="fa-solid fa-at"></i><input type="text" id="reg-username"
                        placeholder="Username" required></div>
                <div class="input-group"><i class="fa-solid fa-envelope"></i><input type="email" id="reg-email"
                        placeholder="Email Address" required></div>
                <div class="input-group"><i class="fa-solid fa-lock"></i><input type="password" id="reg-password"
                        placeholder="Password" required></div>
                <button type="submit" class="btn">Register</button>
            </form>
            <p class="switch-text">Already have an account? <a href="#" onclick="switchCard('login-card')">Login</a></p>
        </div>

        <div id="verify-card" class="auth-card hidden">
            <h2>Verify Email</h2>
            <form id="verify-form">
                <input type="hidden" id="verify-email">
                <div class="input-group"><i class="fa-solid fa-key"></i><input type="text" id="verify-otp"
                        placeholder="Enter OTP" required></div>
                <button type="submit" class="btn">Verify</button>
            </form>
        </div>

        <div id="login-card" class="auth-card hidden">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div class="input-group"><i class="fa-solid fa-envelope"></i><input type="email" id="login-email"
                        placeholder="Email Address" required></div>
                <div class="input-group"><i class="fa-solid fa-lock"></i><input type="password" id="login-password"
                        placeholder="Password" required></div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p class="switch-text">New here? <a href="#" onclick="switchCard('register-card')">Register</a></p>
        </div>

        <div id="dashboard-card" class="dashboard-card hidden">
            <div class="dash-header">
                <div>
                    <h1>Hey, <span id="user-display-name">Developer</span>! ✨</h1>
                    <p>Manage your professional workflow</p>
                </div>
                <button id="logout-btn" class="btn-logout"><i class="fa-solid fa-sign-out"></i> Logout</button>
            </div>
            <div class="task-form-container">
    <h3><i class="fa-solid fa-circle-plus"></i> Create New Task</h3>
    <form id="task-form">
        <input type="hidden" id="task-id-edit">

        <div class="form-row task-title-row">
            <input type="text" id="task-title" placeholder="Task Title..." required>

            <button type="button" id="ask-ai-btn" class="btn-action-primary ai-btn-style">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Ask AI
            </button>
                        <select id="task-priority">
                            <option value="LOW">LOW</option>
                            <option value="MEDIUM" selected>MEDIUM</option>
                            <option value="HIGH">HIGH</option>
                        </select>
                    </div>

                    <div id="ai-tag-wrapper"
                        style="margin: 5px 0 10px 0; font-size: 14px; font-weight: bold; color: #a777e3; display: none;">
                        Suggested Tag: <span id="task-tag-preview">#Personal</span>
                    </div>
                    <textarea id="task-desc" placeholder="Task Description details..." rows="2"></textarea>

                    <div class="form-row-grid">
                        <div class="input-date-wrap">
                            <label>Due Date:</label>
                            <input type="date" id="task-date">
                        </div>
                        <div class="input-date-wrap">
                            <label>Status:</label>
                            <select id="task-status">
                                <option value="PENDING">PENDING</option>
                                <option value="IN_PROGRESS">IN_PROGRESS</option>
                                <option value="COMPLETED">COMPLETED</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="task-submit-btn" class="btn-action-primary">Add Task</button>
                    <button type="button" id="cancel-edit-btn" class="btn-action-secondary hidden"
                        onclick="resetTaskForm()">Cancel Edit</button>
                </form>
            </div>

            <div class="todo-section">
                <h3><i class="fa-solid fa-folder-open"></i> Your Active Dashboard</h3>
                <div id="tasks-container" class="tasks-grid-list">
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="../Static/script.js"></script>
</body>

</html>
